<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy & AI Lab | Geospatial Transect</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- Dark Mode Lab Theme --- */
        :root {
            --bg-color: #0f172a;      
            --card-bg: #1e293b;       
            --text-main: #f8fafc;     
            --text-muted: #94a3b8;
            --accent-energy: #f59e0b; 
            --accent-ai: #06b6d4;     
            --border-radius: 12px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); padding: 16px; }

        .dashboard-container {
            display: grid;
            gap: 16px;
            grid-template-columns: 1fr; 
        }

        .header {
            padding: 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border: 1px solid #334155;
            color: white;
            border-radius: var(--border-radius);
            text-align: center;
        }
        
        .header h2 { font-weight: 600; letter-spacing: 1px; }
        .header p { color: var(--accent-ai); font-size: 0.9rem; margin-top: 4px; text-transform: uppercase; }

        .kpi-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--border-radius);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kpi-value { font-size: 2rem; font-weight: bold; margin-top: 8px; color: var(--text-main); }
        .kpi-value.energy { color: var(--accent-energy); }
        .kpi-value.ai { color: var(--accent-ai); }
        .kpi-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

        .chart-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--border-radius);
            border: 1px solid #334155;
            position: relative; 
            height: 320px; 
            width: 100%;
        }

        /* The map container needs a very specific height to render properly */
        #transectMap {
            height: 400px;
            width: 100%;
            border-radius: var(--border-radius);
            border: 1px solid #334155;
            z-index: 1; /* Keeps map controls from overlapping other elements on mobile */
        }

        /* Customizing Leaflet Popup for Dark Mode */
        .leaflet-popup-content-wrapper { background: #1e293b; color: #f8fafc; border: 1px solid #334155; }
        .leaflet-popup-tip { background: #1e293b; }
        .leaflet-popup-content strong { color: var(--accent-ai); }

        /* --- Desktop Layout --- */
        @media (min-width: 768px) {
            body { padding: 32px; }
            
            .dashboard-container {
                grid-template-columns: repeat(3, 1fr); 
            }

            .header {
                grid-column: span 3;
                text-align: left;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .chart-card.wide { grid-column: span 2; height: 350px; }
            .chart-card.square { grid-column: span 1; height: 350px; }
            
            /* Map spans the entire bottom row to show geography clearly */
            .map-container-wrapper { grid-column: span 3; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <div>
                <h2>Energy & AI Lab</h2>
                <p>Geospatial Transect Mapping</p>
            </div>
            <div style="font-size: 0.9rem; color: #10b981;">● ERCOT/PJM Sync Active</div>
        </div>

        <div class="kpi-card">
            <span class="kpi-label">Secured Capacity (MW)</span>
            <span class="kpi-value energy">450</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Active Compute (EFLOPS)</span>
            <span class="kpi-value ai">12.4</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Fleet-Wide PUE</span>
            <span class="kpi-value">1.18</span>
        </div>

        <div class="map-container-wrapper">
            <div id="transectMap"></div>
        </div>

        <div class="chart-card wide">
            <canvas id="energyComputeChart"></canvas>
        </div>
        
        <div class="chart-card square">
            <canvas id="transectChart"></canvas>
        </div>
    </div>
